<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR 3D Tracker Pro Fix</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        #ui { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; flex-direction: column; gap: 10px; width: 80%; max-width: 300px; }
        button { padding: 18px; font-size: 18px; border-radius: 12px; border: none; background: #007AFF; color: white; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        #stop-save-button { background: #FF3B30; display: none; }
        #status { position: absolute; top: 50px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; white-space: nowrap; z-index: 10; pointer-events: none; }
    </style>
</head>
<body>
    <div id="status">準備完了：AR開始を押してください</div>
    <div id="ui">
        <button id="start-button">AR開始</button>
        <button id="stop-save-button">終了して3D保存する</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';

        let scene, camera, renderer, currentSession;
        let lineGeometry, line, positions;
        
        const MAX_POINTS = 10000; // 最大1万点
        let pointCount = 0;
        let lastPoint = new THREE.Vector3(9999, 9999, 9999);
        let isSavingRequested = false;
        
        const startButton = document.getElementById('start-button');
        const stopSaveButton = document.getElementById('stop-save-button');
        const status = document.getElementById('status');

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 50);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // 線のデータを入れる箱を準備
            positions = new Float32Array(MAX_POINTS * 3); 
            lineGeometry = new THREE.BufferGeometry();
            lineGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            lineGeometry.setDrawRange(0, 0); 
            
            const material = new THREE.LineBasicMaterial({ 
                color: 0x00FF00, // 緑色
                linewidth: 5 
            });
            line = new THREE.Line(lineGeometry, material);
            scene.add(line);

            startButton.addEventListener('click', startAR);
            stopSaveButton.addEventListener('click', requestStopAndSave);
        }

        async function startAR() {
            try {
                // WebXR Viewerでエラーが出にくいように optionalFeatures に変更
                const sessionInit = { optionalFeatures: ['local-floor', 'bounded-floor'] };
                const session = await navigator.xr.requestSession('immersive-ar', sessionInit);
                renderer.xr.setSession(session);
                currentSession = session;

                startButton.style.display = 'none';
                stopSaveButton.style.display = 'block';
                status.textContent = "スマホを動かすと軌跡が残ります";

                session.addEventListener('end', onSessionEnd);
                renderer.setAnimationLoop(render);
            } catch (e) {
                status.textContent = "エラー: " + e.message;
            }
        }

        function requestStopAndSave() {
            if (currentSession) {
                isSavingRequested = true;
                status.textContent = "ARを終了しています...";
                currentSession.end();
            }
        }

        function onSessionEnd() {
            currentSession = null;
            startButton.style.display = 'block';
            stopSaveButton.style.display = 'none';
            renderer.setAnimationLoop(null);
            
            if (isSavingRequested) {
                exportGLTF();
                isSavingRequested = false;
            } else {
                status.textContent = "AR終了。";
            }
        }

        // ここが一番重要な「スマホの座標を取る」部分です
        function render(timestamp, frame) {
            if (frame) {
                const refSpace = renderer.xr.getReferenceSpace();
                if (refSpace) {
                    // スマホ（Viewer）の正確な位置をARシステムから直接取得
                    const pose = frame.getViewerPose(refSpace);

                    if (pose) {
                        const pos = pose.transform.position;
                        const currentPos = new THREE.Vector3(pos.x, pos.y, pos.z);

                        // 前回から1cm以上動いた時だけ点を追加
                        if (pointCount === 0 || lastPoint.distanceTo(currentPos) > 0.01) {
                            if (pointCount < MAX_POINTS) {
                                positions[pointCount * 3] = pos.x;
                                positions[pointCount * 3 + 1] = pos.y;
                                positions[pointCount * 3 + 2] = pos.z;
                                
                                pointCount++;
                                lineGeometry.setDrawRange(0, pointCount);
                                lineGeometry.attributes.position.needsUpdate = true;
                                
                                lastPoint.copy(currentPos); 
                                status.textContent = `記録中: ${pointCount} 点`;
                            }
                        }
                    } else {
                        status.textContent = "位置を計算中...少し動かしてください";
                    }
                }
            }
            renderer.render(scene, camera);
        }

        function exportGLTF() {
            if (pointCount < 2) {
                status.textContent = "データが少なすぎて保存できませんでした。";
                return;
            }
            status.textContent = "3Dデータを保存中...";
            const exporter = new GLTFExporter();
            exporter.parse(scene, (gltf) => {
                const blob = new Blob([JSON.stringify(gltf)], { type: 'application/octet-stream' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'my_trajectory.gltf';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                status.textContent = "保存完了！";
            });
        }

        init();
    </script>
</body>
</html>
