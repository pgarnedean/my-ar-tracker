<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2D Trajectory Map</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: -apple-system, sans-serif; color: white; }
        #map-canvas { background: #000; width: 100vw; height: 100vh; touch-action: none; }
        #ui { position: absolute; bottom: 30px; left: 0; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 12px; z-index: 100; }
        .btn-group { display: flex; gap: 10px; width: 90%; max-width: 400px; }
        button { flex: 1; padding: 16px; font-size: 16px; font-weight: bold; border: none; border-radius: 12px; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #start-btn { background: #007AFF; }
        #stop-btn { background: #FF3B30; display: none; }
        #save-btn { background: #34C759; display: none; }
        #info { position: absolute; top: 50px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 20px; font-size: 14px; white-space: nowrap; }
    </style>
</head>
<body>
    <div id="info">準備完了：スタートを押してください</div>
    <canvas id="map-canvas"></canvas>
    
    <div id="ui">
        <div class="btn-group">
            <button id="start-btn">スタート</button>
            <button id="stop-btn">終了</button>
            <button id="save-btn">PDF保存</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('map-canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const saveBtn = document.getElementById('save-btn');
        const info = document.getElementById('info');

        let points = [];
        let isTracking = false;
        let posX = 0, posZ = 0; // メートル単位
        let velX = 0, velZ = 0; // 速度
        
        const PPM = 50; // 画面表示：1メートル = 50ピクセル
        let lastTime = 0;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            draw();
        }
        window.addEventListener('resize', resize);
        resize();

        // 加速度センサーの許可と開始
        async function startTracking() {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                const permission = await DeviceMotionEvent.requestPermission();
                if (permission !== 'granted') {
                    alert('センサーの利用が許可されませんでした');
                    return;
                }
            }

            isTracking = true;
            points = [{x: 0, z: 0}];
            posX = 0; posZ = 0; velX = 0; velZ = 0;
            
            startBtn.style.display = 'none';
            stopBtn.style.display = 'block';
            saveBtn.style.display = 'none';
            info.textContent = "追跡中：スマホを持って移動してください";

            window.addEventListener('devicemotion', handleMotion);
            requestAnimationFrame(updateLoop);
        }

        function stopTracking() {
            isTracking = false;
            window.removeEventListener('devicemotion', handleMotion);
            stopBtn.style.display = 'none';
            startBtn.style.display = 'block';
            saveBtn.style.display = 'block';
            info.textContent = "停止しました。PDF保存が可能です。";
        }

        function handleMotion(event) {
            if (!isTracking) return;
            const dt = 0.02; // 約50Hzと仮定
            
            // 傾きを無視した重力除去後の加速度（重力加速度を除いた純粋な移動）
            // 注意: iPhoneのWebXR Viewerの場合、accel.x/zを使用
            const acc = event.acceleration;
            if (!acc.x) return;

            // 速度と位置を更新（ダブル積分）
            // 軽微なノイズカット（静止時のドリフト軽減）
            if (Math.abs(acc.x) > 0.1) velX += acc.x * dt;
            if (Math.abs(acc.z) > 0.1) velZ += acc.z * dt;
            
            // 摩擦係数（速度が無限に増えないように微調整）
            velX *= 0.95;
            velZ *= 0.95;

            posX += velX * dt;
            posZ += velZ * dt;

            // 5cm以上動いたらプロット
            const last = points[points.length - 1];
            if (Math.hypot(posX - last.x, posZ - last.z) > 0.05) {
                points.push({x: posX, z: posZ});
            }
        }

        function updateLoop() {
            if (isTracking) {
                draw();
                requestAnimationFrame(updateLoop);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            ctx.save();
            ctx.translate(cx, cy);

            // 1mのグリッド描画
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            for(let i = -20; i <= 20; i++) {
                ctx.beginPath(); ctx.moveTo(i * PPM, -1000); ctx.lineTo(i * PPM, 1000); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-1000, i * PPM); ctx.lineTo(1000, i * PPM); ctx.stroke();
            }

            // 軌跡の描画
            if (points.length > 1) {
                ctx.strokeStyle = '#00FF00';
                ctx.lineWidth = 3;
                ctx.lineJoin = 'round';
                ctx.beginPath();
                ctx.moveTo(points[0].x * PPM, points[0].z * PPM);
                for (let i = 1; i < points.length; i++) {
                    ctx.lineTo(points[i].x * PPM, points[i].z * PPM);
                }
                ctx.stroke();
            }

            // 現在地
            ctx.fillStyle = 'red';
            ctx.beginPath();
            ctx.arc(posX * PPM, posZ * PPM, 5, 0, Math.PI*2);
            ctx.fill();

            ctx.restore();
        }

        function savePDF() {
            const { jsPDF } = window.jspdf;
            
            // 範囲計算
            let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
            points.forEach(p => {
                minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
                minZ = Math.min(minZ, p.z); maxZ = Math.max(maxZ, p.z);
            });

            const margin = 2; // 2m余白
            const w = (maxX - minX) + margin * 2;
            const h = (maxZ - minZ) + margin * 2;

            const pdfCanvas = document.createElement('canvas');
            const pdfPPM = 100;
            pdfCanvas.width = w * pdfPPM;
            pdfCanvas.height = h * pdfPPM;
            const pctx = pdfCanvas.getContext('2d');

            pctx.fillStyle = 'white';
            pctx.fillRect(0, 0, pdfCanvas.width, pdfCanvas.height);
            pctx.translate((-minX + margin) * pdfPPM, (-minZ + margin) * pdfPPM);

            // グリッド
            pctx.strokeStyle = '#eee';
            for(let i = Math.floor(minX - margin); i <= Math.ceil(maxX + margin); i++) {
                pctx.beginPath(); pctx.moveTo(i * pdfPPM, -10000); pctx.lineTo(i * pdfPPM, 10000); pctx.stroke();
            }
            for(let i = Math.floor(minZ - margin); i <= Math.ceil(maxZ + margin); i++) {
                pctx.beginPath(); pctx.moveTo(-10000, i * pdfPPM); pctx.lineTo(10000, i * pdfPPM); pctx.stroke();
            }

            // 軌跡
            pctx.strokeStyle = 'black';
            pctx.lineWidth = 2;
            pctx.beginPath();
            pctx.moveTo(points[0].x * pdfPPM, points[0].z * pdfPPM);
            points.forEach(p => pctx.lineTo(p.x * pdfPPM, p.z * pdfPPM));
            pctx.stroke();

            const pdf = new jsPDF(w > h ? 'l' : 'p', 'mm', [w * 10, h * 10]);
            pdf.addImage(pdfCanvas.toDataURL('image/png'), 'PNG', 0, 0, w * 10, h * 10);
            pdf.save('map.pdf');
        }

        startBtn.addEventListener('click', startTracking);
        stopBtn.addEventListener('click', stopTracking);
        saveBtn.addEventListener('click', savePDF);
    </script>
</body>
</html>
