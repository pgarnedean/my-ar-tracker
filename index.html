<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR 2D Map Tracker</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #222; }
        
        /* カメラ映像と2Dマップを重ねる設定 */
        #gl-canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.4; } /* 安全のためカメラ映像をうっすら表示 */
        #map-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }
        
        #ui { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; flex-direction: column; gap: 15px; width: 85%; max-width: 320px; }
        .btn-row { display: flex; gap: 10px; }
        button { flex: 1; padding: 15px; font-size: 16px; border-radius: 10px; border: none; color: white; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        button:disabled { background: #555 !important; color: #888; cursor: not-allowed; box-shadow: none; }
        
        #start-btn { background: #007AFF; }
        #stop-btn { background: #FF3B30; }
        #save-btn { background: #34C759; }
        
        #status { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 12px 20px; border-radius: 20px; font-size: 14px; white-space: nowrap; z-index: 10; }
    </style>
</head>
<body>
    <div id="status">準備完了：スタートを押してください</div>
    
    <div id="gl-canvas-container"></div>
    <canvas id="map-canvas"></canvas>

    <div id="ui">
        <div class="btn-row">
            <button id="start-btn">スタート</button>
            <button id="stop-btn" disabled>終了</button>
        </div>
        <button id="save-btn" disabled>PDFで保存する</button>
    </div>

    <script type="module">
        import * as THREE from 'three';

        // UI要素
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const saveBtn = document.getElementById('save-btn');
        const status = document.getElementById('status');
        
        // 2Dキャンバスの設定
        const canvas = document.getElementById('map-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Three.js (ARのセンサー取得用)
        let scene, camera, renderer, currentSession;
        let isTracking = false;
        
        // 軌跡データ (XとZの平面座標のみ保存)
        let points = [];
        let lastPoint = null;

        // 描画スケール: 画面上で 1メートル = 50ピクセル
        const PIXELS_PER_METER = 50; 

        function init() {
            const container = document.getElementById('gl-canvas-container');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            container.appendChild(renderer.domElement);

            startBtn.addEventListener('click', startAR);
            stopBtn.addEventListener('click', stopAR);
            saveBtn.addEventListener('click', exportPDF);
            
            drawMap(); // 初期画面を描画
        }

        async function startAR() {
            try {
                const sessionInit = { optionalFeatures: ['local-floor', 'bounded-floor'] };
                const session = await navigator.xr.requestSession('immersive-ar', sessionInit);
                renderer.xr.setSession(session);
                currentSession = session;

                isTracking = true;
                points = []; // データをリセット
                lastPoint = null;
                
                startBtn.disabled = true;
                stopBtn.disabled = false;
                saveBtn.disabled = true;
                status.textContent = "記録中... スマホを持って歩いてください";

                session.addEventListener('end', onSessionEnd);
                renderer.setAnimationLoop(render);
            } catch (e) {
                status.textContent = "ARを開始できません: " + e.message;
            }
        }

        function stopAR() {
            if (currentSession) {
                currentSession.end();
            }
        }

        function onSessionEnd() {
            currentSession = null;
            isTracking = false;
            renderer.setAnimationLoop(null);
            
            startBtn.disabled = false;
            stopBtn.disabled = true;
            
            if (points.length > 2) {
                saveBtn.disabled = false;
                status.textContent = "記録終了。PDFで保存できます。";
            } else {
                status.textContent = "データが少なすぎます。もう一度スタートしてください。";
            }
        }

        // スマホの位置を毎フレーム取得
        function render(timestamp, frame) {
            if (frame && isTracking) {
                const refSpace = renderer.xr.getReferenceSpace();
                if (refSpace) {
                    const pose = frame.getViewerPose(refSpace);
                    if (pose) {
                        const pos = pose.transform.position;
                        // X軸とZ軸（平面）だけを取得
                        const currentX = pos.x;
                        const currentZ = pos.z;
                        
                        // 初回、または前回から2cm以上動いた時だけ記録
                        if (!lastPoint || Math.hypot(currentX - lastPoint.x, currentZ - lastPoint.z) > 0.02) {
                            points.push({ x: currentX, z: currentZ });
                            lastPoint = { x: currentX, z: currentZ };
                            status.textContent = `記録中: ${points.length} 地点`;
                        }
                    }
                }
            }
            renderer.render(scene, camera);
            drawMap(); // 2Dマップを更新
        }

        // 画面に2Dマップと線を引く処理
        function drawMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 画面の中心を基準点にする
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // スマホの現在地が常に画面中央になるように全体をずらす
            let offsetX = 0;
            let offsetZ = 0;
            if (points.length > 0) {
                const last = points[points.length - 1];
                offsetX = -last.x * PIXELS_PER_METER;
                offsetZ = -last.z * PIXELS_PER_METER;
            }

            ctx.save();
            ctx.translate(centerX + offsetX, centerY + offsetZ);

            // --- 1メートルのマス目（グリッド）を描画 ---
            ctx.strokeStyle = "rgba(255, 255, 255, 0.2)";
            ctx.lineWidth = 1;
            const gridSize = PIXELS_PER_METER;
            // -50m から +50m の範囲にグリッドを引く
            for (let i = -50; i <= 50; i++) {
                // 縦線
                ctx.beginPath(); ctx.moveTo(i * gridSize, -50 * gridSize); ctx.lineTo(i * gridSize, 50 * gridSize); ctx.stroke();
                // 横線
                ctx.beginPath(); ctx.moveTo(-50 * gridSize, i * gridSize); ctx.lineTo(50 * gridSize, i * gridSize); ctx.stroke();
            }

            // --- スマホの軌跡を描画 ---
            if (points.length > 1) {
                ctx.strokeStyle = "#00FF00"; // 緑色
                ctx.lineWidth = 4;
                ctx.lineCap = "round";
                ctx.lineJoin = "round";
                ctx.beginPath();
                ctx.moveTo(points[0].x * PIXELS_PER_METER, points[0].z * PIXELS_PER_METER);
                for (let i = 1; i < points.length; i++) {
                    ctx.lineTo(points[i].x * PIXELS_PER_METER, points[i].z * PIXELS_PER_METER);
                }
                ctx.stroke();
            }

            // --- 現在地に赤い点を打つ ---
            if (points.length > 0) {
                const last = points[points.length - 1];
                ctx.fillStyle = "red";
                ctx.beginPath();
                ctx.arc(last.x * PIXELS_PER_METER, last.z * PIXELS_PER_METER, 6, 0, Math.PI * 2);
                ctx.fill();
            }
            
            ctx.restore();
        }

        // PDFで保存する処理
        function exportPDF() {
            if (points.length < 2) return;
            status.textContent = "PDFを作成中...";

            // 1. 軌跡の最小・最大座標を計算して「必要な広さ」を求める
            let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
            points.forEach(p => {
                if (p.x < minX) minX = p.x;
                if (p.x > maxX) maxX = p.x;
                if (p.z < minZ) minZ = p.z;
                if (p.z > maxZ) maxZ = p.z;
            });

            // 線がある場所から上下左右に「2メートル」ずつの余白を作る
            const marginMeters = 2;
            minX -= marginMeters;
            maxX += marginMeters;
            minZ -= marginMeters;
            maxZ += marginMeters;

            // 幅と高さをメートルで計算
            const widthMeters = maxX - minX;
            const heightMeters = maxZ - minZ;

            // 2. PDF描画用の裏キャンバスを作成（PDFの解像度に合わせて高画質に: 1m = 100px）
            const PDF_PPM = 100; 
            const offscreenCanvas = document.createElement('canvas');
            offscreenCanvas.width = widthMeters * PDF_PPM;
            offscreenCanvas.height = heightMeters * PDF_PPM;
            const oCtx = offscreenCanvas.getContext('2d');

            // 背景を白にする
            oCtx.fillStyle = "white";
            oCtx.fillRect(0, 0, offscreenCanvas.width, offscreenCanvas.height);

            // 座標の中心位置を調整
            oCtx.translate(-minX * PDF_PPM, -minZ * PDF_PPM);

            // 1メートルのマス目を描画（水色）
            oCtx.strokeStyle = "#E0E0E0";
            oCtx.lineWidth = 1;
            for (let i = Math.floor(minX); i <= Math.ceil(maxX); i++) {
                oCtx.beginPath(); oCtx.moveTo(i * PDF_PPM, minZ * PDF_PPM); oCtx.lineTo(i * PDF_PPM, maxZ * PDF_PPM); oCtx.stroke();
            }
            for (let i = Math.floor(minZ); i <= Math.ceil(maxZ); i++) {
                oCtx.beginPath(); oCtx.moveTo(minX * PDF_PPM, i * PDF_PPM); oCtx.lineTo(maxX * PDF_PPM, i * PDF_PPM); oCtx.stroke();
            }

            // 軌跡を描画（黒色）
            oCtx.strokeStyle = "#000000";
            oCtx.lineWidth = 3;
            oCtx.lineCap = "round";
            oCtx.lineJoin = "round";
            oCtx.beginPath();
            oCtx.moveTo(points[0].x * PDF_PPM, points[0].z * PDF_PPM);
            for (let i = 1; i < points.length; i++) {
                oCtx.lineTo(points[i].x * PDF_PPM, points[i].z * PDF_PPM);
            }
            oCtx.stroke();

            // スタート地点(青)とゴール地点(赤)のマーク
            oCtx.fillStyle = "blue"; oCtx.beginPath(); oCtx.arc(points[0].x * PDF_PPM, points[0].z * PDF_PPM, 5, 0, Math.PI * 2); oCtx.fill();
            oCtx.fillStyle = "red"; oCtx.beginPath(); oCtx.arc(points[points.length-1].x * PDF_PPM, points[points.length-1].z * PDF_PPM, 5, 0, Math.PI * 2); oCtx.fill();

            // 3. 画像化してjsPDFでPDFファイルにする
            const imgData = offscreenCanvas.toDataURL("image/png");
            const { jsPDF } = window.jspdf;
            
            // 縦長か横長かでPDFの向きを自動判定
            const orientation = widthMeters > heightMeters ? 'l' : 'p';
            
            // 余白を含めた実際のメートル数 × 10倍 をPDFのミリサイズ(mm)にする (例: 10mなら100mm)
            // これにより、印刷したときにも縦横の比率が完璧に保たれます
            const pdf = new jsPDF(orientation, 'mm', [widthMeters * 10, heightMeters * 10]);
            
            pdf.addImage(imgData, 'PNG', 0, 0, widthMeters * 10, heightMeters * 10);
            pdf.save("AR_Map.pdf");
            
            status.textContent = "PDFの保存が完了しました！";
        }

        init();
    </script>
</body>
</html>
