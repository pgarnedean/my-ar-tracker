<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fixed AR Precision Map</title>
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }
        #ar-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; background: rgba(0, 0, 0, 0.5); pointer-events: none; }
        #map-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; pointer-events: none; }
        #ui { position: absolute; bottom: 50px; left: 0; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 100; }
        .btn-group { display: flex; gap: 12px; width: 85%; max-width: 400px; }
        button { flex: 1; padding: 22px; font-size: 18px; font-weight: bold; border: none; border-radius: 16px; color: white; box-shadow: 0 4px 20px rgba(0,0,0,0.6); cursor: pointer; -webkit-appearance: none; }
        #start-btn { background: #007AFF; }
        #stop-btn { background: #FF3B30; display: none; }
        #save-btn { background: #34C759; display: none; }
        #status { position: absolute; top: 70px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 12px 24px; border-radius: 40px; font-size: 13px; z-index: 110; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.4); text-align: center; min-width: 220px; }
    </style>
</head>
<body>
    <div id="status">準備完了</div>
    <div id="ar-container"></div>
    <div id="overlay"></div>
    <canvas id="map-canvas"></canvas>

    <div id="ui">
        <div class="btn-group">
            <button id="start-btn">スタート</button>
            <button id="stop-btn">終了</button>
            <button id="save-btn">PDFを保存</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';

        const mapCanvas = document.getElementById('map-canvas');
        const ctx = mapCanvas.getContext('2d');
        const status = document.getElementById('status');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const saveBtn = document.getElementById('save-btn');

        let renderer, scene, camera, currentSession;
        let points = [];
        let isTracking = false;
        let curX = 0, curZ = 0; // 現在の相対座標
        
        const SCALE = 100; // 1メートル = 100ピクセル（1マス）

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.getElementById('ar-container').appendChild(renderer.domElement);

            startBtn.addEventListener('click', startAR);
            stopBtn.addEventListener('click', stopAR);
            saveBtn.addEventListener('click', exportPDF);
            window.addEventListener('resize', onResize);
            
            onResize();
            // 最初から描画ループを回し続ける
            requestAnimationFrame(mainLoop);
        }

        function onResize() {
            mapCanvas.width = window.innerWidth;
            mapCanvas.height = window.innerHeight;
        }

        async function startAR() {
            if (!navigator.xr) {
                alert("AR非対応ブラウザです。");
                return;
            }
            try {
                const session = await navigator.xr.requestSession('immersive-ar', {
                    requiredFeatures: ['local']
                });
                renderer.xr.setSession(session);
                currentSession = session;
                
                points = [{x: 0, z: 0}]; 
                curX = 0; curZ = 0;
                isTracking = true;

                startBtn.style.display = 'none';
                stopBtn.style.display = 'block';
                saveBtn.style.display = 'none';
                status.textContent = "スキャン中... 周囲を映してください";

                session.addEventListener('end', onSessionEnd);
            } catch (e) {
                status.textContent = "起動エラー: " + e.message;
            }
        }

        function stopAR() {
            if (currentSession) currentSession.end();
        }

        function onSessionEnd() {
            isTracking = false;
            stopBtn.style.display = 'none';
            startBtn.style.display = 'block';
            if (points.length > 1) saveBtn.style.display = 'block';
            status.textContent = "保存可能です";
        }

        // メインの描画ループ（ARの更新とは別に回す）
        function mainLoop() {
            updateARData();
            drawScene();
            requestAnimationFrame(mainLoop);
        }

        function updateARData() {
            if (!isTracking) return;
            const frame = renderer.xr.getFrame();
            if (!frame) return;

            const refSpace = renderer.xr.getReferenceSpace();
            const pose = frame.getViewerPose(refSpace);

            if (pose) {
                const pos = pose.transform.position;
                // 初回の位置を基準(0,0)にするためのオフセット計算
                if (points.length === 1 && points[0].x === 0) {
                    points[0] = { x: pos.x, z: pos.z, ox: pos.x, oz: pos.z };
                }

                const offset = points[0];
                curX = pos.x - offset.ox;
                curZ = pos.z - offset.oz;

                const last = points[points.length - 1];
                const dist = Math.hypot(curX - (last.x - offset.ox), curZ - (last.z - offset.oz));

                if (dist > 0.03) {
                    points.push({ x: pos.x, z: pos.z });
                    status.textContent = "追跡中 (1マス=1m)";
                }
            }
        }

        function drawScene() {
            ctx.clearRect(0, 0, mapCanvas.width, mapCanvas.height);
            
            const cx = mapCanvas.width / 2;
            const cy = mapCanvas.height / 2;

            ctx.save();
            // 自分の位置が中心になるように変換
            ctx.translate(cx - curX * SCALE, cy - curZ * SCALE);

            // 1. グリッドの描画
            ctx.strokeStyle = "rgba(255, 255, 255, 0.3)";
            ctx.lineWidth = 1;
            const range = 30; 
            for (let i = -range; i <= range; i++) {
                ctx.beginPath(); ctx.moveTo(i * SCALE, -range * SCALE); ctx.lineTo(i * SCALE, range * SCALE); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-range * SCALE, i * SCALE); ctx.lineTo(range * SCALE, i * SCALE); ctx.stroke();
            }

            // 2. 軌跡の描画
            if (isTracking && points.length > 1) {
                const offset = points[0];
                ctx.strokeStyle = "#00FF00";
                ctx.lineWidth = 6;
                ctx.lineCap = "round";
                ctx.lineJoin = "round";
                ctx.beginPath();
                ctx.moveTo(0, 0); // スタート地点(相対0,0)
                for (let i = 1; i < points.length; i++) {
                    ctx.lineTo((points[i].x - offset.ox) * SCALE, (points[i].z - offset.oz) * SCALE);
                }
                ctx.stroke();
            }

            ctx.restore();

            // 3. 現在地マーク（画面中央に固定）
            ctx.fillStyle = "#FF3B30";
            ctx.beginPath();
            ctx.arc(cx, cy, 10, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "white";
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const offset = points[0];
            let minX = 0, maxX = 0, minZ = 0, maxZ = 0;
            
            const relPoints = points.map(p => ({
                x: p.x - offset.ox,
                z: p.z - offset.oz
            }));

            relPoints.forEach(p => {
                minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
                minZ = Math.min(minZ, p.z); maxZ = Math.max(maxZ, p.z);
            });

            const margin = 1;
            const wM = (maxX - minX) + margin * 2;
            const hM = (maxZ - minZ) + margin * 2;
            const pdfPPM = 100;

            const pdfCanvas = document.createElement('canvas');
            pdfCanvas.width = wM * pdfPPM;
            pdfCanvas.height = hM * pdfPPM;
            const pctx = pdfCanvas.getContext('2d');

            pctx.fillStyle = "white";
            pctx.fillRect(0, 0, pdfCanvas.width, pdfCanvas.height);
            pctx.translate((-minX + margin) * pdfPPM, (-minZ + margin) * pdfPPM);

            pctx.strokeStyle = "#EEE";
            for(let i = Math.floor(minX-margin); i <= Math.ceil(maxX+margin); i++) {
                pctx.beginPath(); pctx.moveTo(i * pdfPPM, -5000); pctx.lineTo(i * pdfPPM, 5000); pctx.stroke();
            }
            for(let i = Math.floor(minZ-margin); i <= Math.ceil(maxZ+margin); i++) {
                pctx.beginPath(); pctx.moveTo(-5000, i * pdfPPM); pctx.lineTo(5000, i * pdfPPM); pctx.stroke();
            }

            pctx.strokeStyle = "black";
            pctx.lineWidth = 4;
            pctx.beginPath();
            pctx.moveTo(0, 0);
            relPoints.forEach(p => pctx.lineTo(p.x * pdfPPM, p.z * pdfPPM));
            pctx.stroke();

            const pdf = new jsPDF(wM > hM ? 'l' : 'p', 'mm', [wM * 10, hM * 10]);
            pdf.addImage(pdfCanvas.toDataURL('image/png'), 'PNG', 0, 0, wM * 10, hM * 10);
            pdf.save("map.pdf");
        }

        init();
    </script>
</body>
</html>
