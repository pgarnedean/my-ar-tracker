<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR 3D Tracker Pro</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        #ui { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; flex-direction: column; gap: 10px; width: 80%; max-width: 300px; }
        button { padding: 15px; font-size: 16px; border-radius: 12px; border: none; background: #007AFF; color: white; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        #stop-button { background: #FF3B30; display: none; }
        #save-button { background: #34C759; }
        button:disabled { background: #8e8e93; opacity: 0.6; }
        #status { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: white; padding: 8px 15px; border-radius: 20px; font-size: 14px; white-space: nowrap; z-index: 10; }
    </style>
</head>
<body>
    <div id="status">カメラを動かして周りを映してください</div>
    <div id="ui">
        <button id="start-button">AR開始</button>
        <button id="stop-button">AR終了</button>
        <button id="save-button" disabled>3Dデータを保存する</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';

        let scene, camera, renderer, currentSession;
        let lineGeometry, line;
        let points = [];
        
        const startButton = document.getElementById('start-button');
        const stopButton = document.getElementById('stop-button');
        const saveButton = document.getElementById('save-button');
        const status = document.getElementById('status');

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 50);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // 線の太さと色の設定
            lineGeometry = new THREE.BufferGeometry();
            const material = new THREE.LineBasicMaterial({ 
                color: 0x00FF00, // 緑色
                linewidth: 10    // ※ブラウザにより太さは固定される場合があります
            });
            line = new THREE.Line(lineGeometry, material);
            scene.add(line);

            startButton.addEventListener('click', startAR);
            stopButton.addEventListener('click', stopAR);
            saveButton.addEventListener('click', exportGLTF);
        }

        async function startAR() {
            try {
                const sessionInit = { requiredFeatures: ['local-floor'] };
                const session = await navigator.xr.requestSession('immersive-ar', sessionInit);
                renderer.xr.setSession(session);
                currentSession = session;

                // UIの表示切り替え
                startButton.style.display = 'none';
                stopButton.style.display = 'block';
                saveButton.disabled = false;
                status.textContent = "スマホを動かすと線が引かれます";

                session.addEventListener('end', onSessionEnd);
                renderer.setAnimationLoop(render);
            } catch (e) {
                alert("ARを開始できませんでした: " + e.message);
            }
        }

        function stopAR() {
            if (currentSession) {
                currentSession.end();
            }
        }

        function onSessionEnd() {
            currentSession = null;
            startButton.style.display = 'block';
            stopButton.style.display = 'none';
            status.textContent = "AR終了。保存ボタンでデータを残せます。";
        }

        function render(timestamp, frame) {
            if (frame) {
                const refSpace = renderer.xr.getReferenceSpace();
                const pose = frame.getViewerPose(refSpace);

                if (pose) {
                    const pos = pose.transform.position;
                    // 現在のスマホ位置
                    const newPoint = new THREE.Vector3(pos.x, pos.y, pos.z);
                    
                    // 1cm以上動いたら新しい点を追加
                    if (points.length === 0 || newPoint.distanceTo(points[points.length - 1]) > 0.01) {
                        points.push(newPoint);
                        lineGeometry.setFromPoints(points);
                        status.textContent = `描画中: ${points.length} 地点記録`;
                    }
                } else {
                    status.textContent = "位置を計算中...スマホをゆっくり動かしてください";
                }
            }
            renderer.render(scene, camera);
        }

        function exportGLTF() {
            if (points.length < 2) {
                alert("データが少なすぎて保存できません。少し歩いてみてください。");
                return;
            }
            status.textContent = "保存用データを作成中...";
            const exporter = new GLTFExporter();
            exporter.parse(scene, (gltf) => {
                const blob = new Blob([JSON.stringify(gltf)], { type: 'application/octet-stream' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'ar_trajectory.gltf';
                a.click();
                status.textContent = "保存完了！";
            });
        }

        init();
    </script>
</body>
</html>
